name: Fetch AI News

on:
  schedule:
    # 8 AM Ljubljana time (6 AM UTC)
    - cron: '0 6 * * *'
    # 8 PM Ljubljana time (6 PM UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Fetch AI news
        run: python collector.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add latest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update AI news feed - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
