name: Build newsletter4ai

on:
  schedule:
    # 8 AM Ljubljana time (6 AM UTC)
    - cron: '0 6 * * *'
    # 8 PM Ljubljana time (6 PM UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:
  # Auto-run on edits to source/config. Path filter excludes latest.json
  # so the bot's own commits do not loop.
  push:
    branches: [master]
    paths:
      - collector.py
      - feeds.json
      - .github/workflows/fetch.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Set to true to kill old runs, false to let them finish in order

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect source feeds
        run: python collector.py

      - name: Generate Claude recap
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: python generate_recap.py

      - name: Build static site
        run: python build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Commit generated data
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ -z "$(git status --porcelain -- latest.json recap.json recap.md)" ]; then
            echo "No generated artifact changes"
            exit 0
          fi

          git add latest.json recap.json recap.md
          git commit -m "Refresh newsletter artifacts - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
