name: Fetch AI News

on:
  schedule:
    # 8 AM Ljubljana time (6 AM UTC)
    - cron: '0 6 * * *'
    # 8 PM Ljubljana time (6 PM UTC)
    - cron: '0 18 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Set to true to kill old runs, false to let them finish in order

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Fetch AI news
        run: python collector.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.NEWSLETTER_TOKEN }}
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if git diff --quiet -- latest.json; then
            echo "No changes to latest.json"
            exit 0
          fi

          git add latest.json
          git commit -m "Update AI news feed - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # Rebase onto the latest remote master, then retry once if another push lands first.
          for attempt in 1 2; do
            git pull --rebase origin master
            if git push https://x-access-token:${GITHUB_TOKEN}@github.com/svigs/newsletter4ai.git HEAD:master; then
              exit 0
            fi

            if [ "$attempt" -eq 2 ]; then
              echo "Push failed after retry"
              exit 1
            fi

            echo "Push was rejected, rebasing on latest master and retrying"
          done
